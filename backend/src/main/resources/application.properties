server.port=8080

# File storage paths (relative to working directory)
app.data.dir=data
app.students-file=${app.data.dir}/students.txt
app.courses-file=${app.data.dir}/courses.txt
app.enrollments-file=${app.data.dir}/enrollments.txt
app.log-file=${app.data.dir}/activity_log.txt

# Disable Spring's own default error page so our frontend handles errors
server.error.whitelabel.enabled=false
