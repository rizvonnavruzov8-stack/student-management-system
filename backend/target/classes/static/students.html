<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMS — Students</title>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><span>🎓</span> SMS</div>
  <a class="nav-link" href="index.html"><span class="icon">📊</span> Dashboard</a>
  <a class="nav-link active" href="students.html"><span class="icon">👤</span> Students</a>
  <a class="nav-link" href="courses.html"><span class="icon">📚</span> Courses</a>
  <a class="nav-link" href="enrollment.html"><span class="icon">📝</span> Enrollment</a>
</nav>

<main class="main">
  <div class="page-header">
    <h1>👤 Students</h1>
    <p>Manage all students in the system</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search by name, ID, email…"/>
    </div>
    <select class="form-control" id="sort-select" style="width:160px;">
      <option value="">Sort by…</option>
      <option value="gpa">GPA (High→Low)</option>
      <option value="name">Name A→Z</option>
    </select>
    <button class="btn btn-primary" id="btn-add">+ Add Student</button>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Student ID</th><th>Email</th>
            <th>Type</th><th>GPA</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="students-body"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="student-modal">
  <div class="modal">
    <h2 id="modal-title">Add Student</h2>
    <div class="checkbox-row form-group">
      <input type="checkbox" id="is-graduate"/>
      <label for="is-graduate" style="margin:0;">Graduate Student</label>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>First Name *</label>
        <input class="form-control" id="f-first" placeholder="John"/>
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input class="form-control" id="f-last" placeholder="Doe"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Student ID *</label>
        <input class="form-control" id="f-code" placeholder="STU-001"/>
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input class="form-control" id="f-dob" type="date"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input class="form-control" id="f-email" type="email" placeholder="john@example.com"/>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select class="form-control" id="f-status">
        <option>ACTIVE</option><option>INACTIVE</option><option>GRADUATED</option>
      </select>
    </div>
    <!-- Graduate fields -->
    <div id="grad-fields" style="display:none;">
      <div class="form-group">
        <label>Research Topic</label>
        <input class="form-control" id="f-research" placeholder="AI in Healthcare"/>
      </div>
      <div class="form-group">
        <label>Supervisor Name</label>
        <input class="form-control" id="f-supervisor" placeholder="Prof. Smith"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-edit" onclick="closeModal('student-modal')">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="js/app.js"></script>
<script>
let allStudents = [];
let editingId = null;

document.getElementById('is-graduate').addEventListener('change', e => {
  document.getElementById('grad-fields').style.display = e.target.checked ? 'block' : 'none';
});

document.getElementById('search-input').addEventListener('input', renderTable);
document.getElementById('sort-select').addEventListener('change', renderTable);
document.getElementById('btn-add').addEventListener('click', openAddModal);
document.getElementById('modal-save-btn').addEventListener('click', saveStudent);

async function loadStudents() {
  try {
    allStudents = await api('/api/students');
    renderTable();
  } catch(e) { toast('Failed to load students', 'error'); }
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let data = allStudents.filter(s =>
    (s.firstName+' '+s.lastName+s.studentId+s.email).toLowerCase().includes(q)
  );
  if (sort === 'gpa') data.sort((a,b) => b.gpa - a.gpa);
  if (sort === 'name') data.sort((a,b) => a.firstName.localeCompare(b.firstName));

  const tbody = document.getElementById('students-body');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>No students found.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(s => {
    const isGrad = s.researchTopic !== undefined;
    return `<tr>
      <td>${s.id}</td>
      <td>${s.firstName} ${s.lastName}</td>
      <td><code style="background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:4px;">${s.studentId}</code></td>
      <td>${s.email}</td>
      <td><span class="badge badge-${isGrad ? 'graduate' : 'active'}">${isGrad ? '🎓 Graduate' : 'Undergrad'}</span></td>
      <td>${s.gpa.toFixed(2)}<span class="gpa-bar"><span class="gpa-bar-fill" style="width:${(s.gpa / 4) * 100}%"></span></span></td>
      <td><span class="badge badge-${(s.status||'').toLowerCase()}">${s.status||'—'}</span></td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-edit btn-sm" onclick="openEditModal(${s.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Student';
  document.getElementById('modal-save-btn').textContent = 'Add';
  clearForm();
  openModal('student-modal');
}

function openEditModal(id) {
  editingId = id;
  const s = allStudents.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modal-title').textContent = 'Edit Student';
  document.getElementById('modal-save-btn').textContent = 'Update';
  document.getElementById('f-first').value = s.firstName || '';
  document.getElementById('f-last').value = s.lastName || '';
  document.getElementById('f-code').value = s.studentId || '';
  document.getElementById('f-email').value = s.email || '';
  document.getElementById('f-dob').value = s.dateOfBirth || '';
  document.getElementById('f-status').value = s.status || 'ACTIVE';
  const isGrad = s.researchTopic !== undefined;
  document.getElementById('is-graduate').checked = isGrad;
  document.getElementById('grad-fields').style.display = isGrad ? 'block' : 'none';
  if (isGrad) {
    document.getElementById('f-research').value = s.researchTopic || '';
    document.getElementById('f-supervisor').value = s.supervisorName || '';
  }
  openModal('student-modal');
}

async function saveStudent() {
  const isGrad = document.getElementById('is-graduate').checked;
  const payload = {
    studentId: document.getElementById('f-code').value.trim(),
    firstName: document.getElementById('f-first').value.trim(),
    lastName:  document.getElementById('f-last').value.trim(),
    email:     document.getElementById('f-email').value.trim(),
    dateOfBirth: document.getElementById('f-dob').value,
    status:    document.getElementById('f-status').value,
    ...(isGrad ? {
      researchTopic:  document.getElementById('f-research').value.trim(),
      supervisorName: document.getElementById('f-supervisor').value.trim(),
    } : {})
  };
  // Jackson needs the subtype field to deserialize correctly
  if (isGrad) payload.type = 'graduate'; else payload.type = 'student';

  try {
    if (editingId) {
      await api(`/api/students/${editingId}`, 'PUT', payload);
      toast('Student updated!');
    } else {
      await api('/api/students', 'POST', payload);
      toast('Student added!');
    }
    closeModal('student-modal');
    await loadStudents();
  } catch(e) { toast(e.message || 'Error saving student', 'error'); }
}

async function deleteStudent(id) {
  if (!confirm('Delete this student?')) return;
  try {
    await api(`/api/students/${id}`, 'DELETE');
    toast('Student deleted.');
    await loadStudents();
  } catch(e) { toast(e.message || 'Delete failed', 'error'); }
}

function clearForm() {
  ['f-first','f-last','f-code','f-email','f-dob','f-research','f-supervisor']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('f-status').value = 'ACTIVE';
  document.getElementById('is-graduate').checked = false;
  document.getElementById('grad-fields').style.display = 'none';
}

loadStudents();
</script>
</body>
</html>
